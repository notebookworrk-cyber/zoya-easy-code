name: Stale Issue Manager

on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale due to 90 days
            of inactivity. It will be closed in 14 days if no further activity
            occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale due to 90
            days of inactivity. It will be closed in 14 days if no further
            activity occurs.
          days-before-stale: 90
          days-before-close: 14
